<html>
  <head>
    <meta charset="UTF-8">
    <title>いんふぱうのページ</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>いんふぱうのページ</h1>
    <p>いんふぱうのページへようこそ</p>
    <ul id="page-list">
      <li>ページ概要を読み込んでいます…</li>
    </ul>
    <section>
      <h2>自己紹介</h2>
      <p>こんにちは、いんふぱうです。好きなことをこのサイトにまとめています。</p>
      <p>将来的には、もっと多くのコンテンツをこのページに追加していきます。</p>
    </section>
    <section>
      <h2>SNS</h2>
      <ul>
        <li><a href="https://x.com/InftyPow60455/" target="_blank" rel="noopener">X(旧Twitter)</a></li>
        <li><a href="https://note.com/shiny_tulip614" target="_blank" rel="noopener">Note</a></li>
        <li><a href="https://github.com/InfinitePower-ri" target="_blank" rel="noopener">GitHub</a></li>
      </ul>
    </section>
    <section>
      <h2>更新履歴</h2>
      <ul id="update-list">
        <li>更新履歴を読み込んでいます…</li>
      </ul>
    </section>
    <script>
      async function loadPages() {
        const list = document.getElementById("page-list");
        const pagesUrl = new URL("pages.json", document.baseURI).href;
        try {
          const response = await fetch(pagesUrl);
          if (!response.ok) {
            throw new Error("ページデータが読み込めませんでした。");
          }
          const pages = await response.json();
          if (!Array.isArray(pages) || pages.length === 0) {
            list.innerHTML = "<li>ページ情報はまだありません。</li>";
            return;
          }
          list.innerHTML = pages
            .map(
              (page) =>
                `<li><a href="${page.href}">${page.title}</a><p>${page.description}</p></li>`
            )
            .join("");
        } catch (error) {
          list.innerHTML = `<li>${error.message}</li>`;
        }
      }

      async function loadUpdates() {
        const list = document.getElementById("update-list");
        const updatesUrl = new URL("updates.json", document.baseURI).href;
        try {
          const response = await fetch(updatesUrl);
          if (!response.ok) {
            throw new Error("更新履歴データが読み込めませんでした。");
          }
          const updates = await response.json();
          if (!Array.isArray(updates) || updates.length === 0) {
            list.innerHTML = "<li>更新履歴はまだありません。</li>";
            return;
          }
          list.innerHTML = updates
            .map((item) => `<li>${item.date}: ${item.text}</li>`)
            .join("");
        } catch (error) {
          list.innerHTML = `<li>${error.message}</li>`;
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadPages();
        loadUpdates();
        updateVisitCount();
      });

      function updateVisitCount() {
        const counter = document.getElementById("visit-count");
        if (!counter) return;
        try {
          const storageKey = "mywebpage_visit_count";
          const countedKey = "mywebpage_visit_counted";
          const currentValue = Number(localStorage.getItem(storageKey)) || 0;
          const alreadyCounted = sessionStorage.getItem(countedKey) === "true";
          const nextValue = alreadyCounted ? currentValue : currentValue + 1;
          if (!alreadyCounted) {
            localStorage.setItem(storageKey, nextValue);
            sessionStorage.setItem(countedKey, "true");
          }
          counter.textContent = `このページの訪問回数: ${nextValue}回`;
        } catch (error) {
          counter.textContent = "訪問回数を記録できませんでした。";
        }
      }
    </script>
    <footer>
      <p id="visit-count">訪問回数を読み込んでいます…</p>
      <p>© 2026 いんふぱうのページ | 作成者: いんふぱう</p>
      <p><a href="https://github.com/InfinitePower-ri" target="_blank" rel="noopener">GitHub</a> | <a href="https://x.com/InftyPow60455/" target="_blank" rel="noopener">お問い合わせ(X)</a></p>
    </footer>
  </body>
</html>
